<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador M3U</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.server{
background:#1e293b;
padding:10px;
margin-top:10px;
border-radius:8px;
font-size:14px;
word-break:break-all;
text-align:left;
}

.copy{
background:#3b82f6;
margin-top:6px;
}

.copy.copiado{
background:#22c55e;
}
</style>
</head>

<body>

<div class="container">

<h2>GERADOR M3U</h2>

<input id="user" placeholder="Usuário">
<input id="pass" placeholder="Senha">

<button onclick="gerar()">Gerar M3U</button>

<div id="resultado"></div>

</div>

<script>

const servidores = [
{nome:"Seven", url:"http://seven.blcplay.com"},
{nome:"Galaxy", url:"http://wv.ntxv8s.site"},
{nome:"Sky", url:"http://meuscanais.pro"},
{nome:"Solar", url:"http://solar.playblc.work"},
{nome:"Atena", url:"http://alproxy.xyz"},
{nome:"Explosion", url:"http://explosion.blcplay5.work"},
{nome:"Fire", url:"http://fire.npremium.fun"},
{nome:"Lunar", url:"http://lunar.blcplay3.work"},
{nome:"Speed", url:"http://speed.blcplay2.work"},
{nome:"Urano", url:"http://urano.playblc.work"},
{nome:"Andromeda", url:"http://andromeda.playblc.work"},
{nome:"Venus", url:"http://venus.playblc.work"},
{nome:"Tita", url:"http://tita.netpl4y.com"},
{nome:"Olympus", url:"http://olympus.netpl4y.com"}
];

function gerar(){

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

let resultado = document.getElementById("resultado");

// NÃO limpa tudo, só substitui os servidores
resultado.innerHTML = "";

servidores.forEach((s,i)=>{

let link = `${s.url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=mpegts`;

let div = document.createElement("div");
div.className = "server";

div.innerHTML = `
<b>${s.nome}</b><br>
<span id="link${i}">${link}</span>
<br>
<button id="btn${i}" class="copy">Copiar</button>
`;

resultado.appendChild(div);

// evento separado (melhor controle)
document.getElementById(`btn${i}`).addEventListener("click", function(){

navigator.clipboard.writeText(link);

// fica verde e PERMANECE
this.classList.add("copiado");
this.innerText = "Copiado";

});

});

}

</script>

</body>
</html>
